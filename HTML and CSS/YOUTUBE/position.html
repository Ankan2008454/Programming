<!DOCTYPE html>
<html>
    <head>
        <title>
            position practice
        </title>
    </head>
    <body style=
    "height:3000px;
     padding-top:60px;
     padding-left:80px;">
        <div
        style="
        background-color:black;
        color:white;
        position:fixed;
        top:10px;
        height:50px;
        left:0;
        right:0;">header</div>
        <div style="
        background-color:green;
        color:white;
        position:fixed;
        left:0;
        bottom:0px;
        top:60px;
        width:72px;">sidebar</div>
        <div style="
        background-color:red;
        color:white;
        position:absolute;
        left:10px;
        top:10px;">
            absolute
        </div>
        <div style="
            background-color:lightblue;
            height:200px;
            width:200px;
            position:static;
            ">div1</div>
        <div style="
            background-color:lightpink;
            height:200px;
            width:200px;">div2</div>
    </body>
</html>
