<!DOCTYPE html>
<html>
    <head>
        <title>
            youtube.com clone
        </title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <style>
            p
            {
                font-family:Roboto,Arial;
                margin-bottom:0;
            }
            .thumbnail
            {
                width:300px;
                display:block; 
            }
            .search-bar
            {
                font-size:20px;
                display:block;
            }
            .video-preview
            {
                width:300px;
                display:inline-block;
                vertical-align:top;
                margin-right:15px;
            }
            .video-author
            {
                font-size:12px;
                color:rgb(96,96,96);
                margin-bottom:1.7px;
            }
            .video-stats
            {
                margin-top:0;
                font-size:12px;
                color:rgb(96,96,96);
            }
            .video-title
            {
                margin-top:0;
                font-size:14px;
                font-weight:500;
                line-height:20px;
            }
            .channel-pic
            {
                display:inline-block;
                width:50px;
                vertical-align:top;
            }
            .video-intro
            {
                display:inline-block;
                width:200px;
            }
            .profile-pic
            {
                width:40px;
                border-radius:50px;
                margin-top:0px;
            }
            .thumbnail-row
            {
                margin-bottom:12px;
            }
        </style>
    </head>
    <body>
        <input class="search-bar" type="text" 
        placeholder="Search">
        <div class="video-preview">
            <div class="thumbnail-row">
                <img class="thumbnail" src="thumbnails/thumbnail-1.webp">
            </div>
            <div>
                <div class="channel-pic"><img class="profile-pic" src="channelpic/channel-1.jpeg"></div>
                <div class="video-intro"><p class="video-title">
                Talking Tech and AI with Google CEO Sundar 
                Pichai!
                </p>
                <p class="video-author">
                    Marques Brownlee
                </p>
                <p class="video-stats">
                    3.4M views · 6 months ago
                </p></div>
            </div>
        </div>
        <div class="video-preview">
            <div class="thumbnail-row">
                <img class="thumbnail" src="thumbnails/thumbnail-2.webp">
            </div>
            <div>
                <div class="channel-pic"><img class="profile-pic" src="channelpic/channel-2.jpeg"></div>
                <div class="video-intro"><p class="video-title">
                Try Not To Laugh Challenge #9
                </p>
                <p class="video-author">
                    Markiplier
                </p>
                <p class="video-stats">
                    19M views · 4 years ago
                </p></div>
            </div>
        </div>
    </body>
</html>
